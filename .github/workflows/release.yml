name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Verify tag matches package metadata
        run: |
          python - <<'PY'
          import json
          import os
          import tomllib
          from pathlib import Path

          root = Path(".")
          tag = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          pyproject = tomllib.loads((root / "pyproject.toml").read_text(encoding="utf-8"))
          server_json = json.loads((root / "server.json").read_text(encoding="utf-8"))
          package_version = pyproject["project"]["version"]
          server_version = server_json["version"]

          if tag != package_version or tag != server_version:
              raise SystemExit(
                  f"Version mismatch: tag={tag}, pyproject.toml={package_version}, server.json={server_version}"
              )
          PY

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build package
        run: python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
